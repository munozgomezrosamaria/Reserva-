<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Recuperar Contraseña - Laguna de la Bolsa</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/recover_password.css">
</head>
<body>

<div class="reset-wrapper">

    <!-- LADO IZQUIERDO -->
    <div class="reset-left">
        <div class="overlay">
            <h1>Recupera tu Acceso</h1>
            <p>
                No te preocupes, te enviaremos un enlace para 
                restablecer tu contraseña y volver a disfrutar 
                de nuestros servicios.
            </p>
        </div>
    </div>

    <!-- LADO DERECHO -->
    <div class="reset-right">
        <div class="reset-card">
            <h2>🔐 Recuperar Contraseña</h2>
            <p class="subtitle">
                Ingresa tu correo electrónico y te enviaremos un enlace
            </p>

            <form id="recover-form">
                <label>Correo Electrónico</label>
                <input type="email" id="email" class="form-control" placeholder="tu@correo.com" required>

                <button type="submit" class="btn-reset">
                    Enviar enlace de recuperación
                </button>
            </form>

            <div id="message" style="display:none; margin-top:15px;"></div>

            <div class="divider">o</div>

            <p class="login-link">
                ¿Recordaste tu contraseña?
                <a href="/pages/login.html">Iniciar sesión</a>
            </p>
        </div>

        <a href="/" class="back">← Volver al inicio</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/api.js"></script>
<script>
document.getElementById('recover-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const btn = e.target.querySelector('button');
    const msgDiv = document.getElementById('message');
    
    btn.disabled = true;
    btn.innerText = 'Procesando...';
    msgDiv.style.display = 'none';

    try {
        const result = await api.passwordResetRequest(email);
        msgDiv.style.display = 'block';
        if (result.success) {
            msgDiv.innerHTML = `<div class="alert alert-success">${result.message}</div>`;
            e.target.reset();
        } else {
            msgDiv.innerHTML = `<div class="alert alert-danger">${result.error}</div>`;
        }
    } catch (err) {
        msgDiv.innerHTML = '<div class="alert alert-danger">Error de conexión con el servidor.</div>';
        msgDiv.style.display = 'block';
    } finally {
        btn.disabled = false;
        btn.innerText = 'Enviar enlace de recuperación';
    }
});
</script>
</body>
</html>
