<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión - Laguna de la Bolsa</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>

<div class="login-background">
    <div class="login-container">

        <div class="logo-circle">LB</div>

        <h1 class="title">Laguna de la Bolsa</h1>
        <p class="subtitle">Ingresa a tu cuenta</p>

        <div class="login-card">
            <h3>Iniciar Sesión</h3>
            <p class="card-subtitle">Accede a tu cuenta para gestionar tus reservas</p>

            <div id="error-message" class="error-message" style="display:none;"></div>

            <form id="login-form">
                <label>Correo Electrónico</label>
                <input type="email" id="email" class="form-control" placeholder="tu@correo.com" required>

                <label>Contraseña</label>
                <input type="password" id="password" class="form-control" required>

                <a href="/pages/recover_password.html" class="forgot">¿Olvidaste tu contraseña?</a>
                <button type="submit" class="btn btn-primary w-100 py-2 mb-3" id="login-btn" style="background-color: #29B6F6; border: none;">
                    Iniciar Sesión
                </button>
            </form>
            
            <div class="text-center mt-3">
                <p class="mb-1"><a href="/pages/recover_password.html" class="text-decoration-none" style="color: #29B6F6;">¿Olvidaste tu contraseña?</a></p>
                <p class="mb-0 text-muted">¿No tienes una cuenta? <a href="/pages/register.html" class="text-decoration-none fw-bold" style="color: #29B6F6;">Regístrate aquí</a></p>
            </div>

            <div class="demo-box">
                <strong>Demo:</strong>
                Usa admin@lagunadelabolsa.com para acceso de administrador
            </div>
        </div>

        <a href="/" class="back">← Volver al inicio</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/api.js"></script>
<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const errorDiv = document.getElementById('error-message');
    const btn = document.querySelector('.btn-login');

    const originalText = btn.textContent;
    btn.textContent = "Iniciando sesión...";
    btn.disabled = true;

    const result = await api.login(email, password);

    btn.textContent = originalText;
    btn.disabled = false;

    if (result.success) {
        window.location.href = '/';
    } else {
        errorDiv.textContent = result.error;
        errorDiv.style.display = 'block';
    }
});
</script>
</body>
</html>
