<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registrarse - Laguna de la Bolsa</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/register.css">
</head>
<body>

<div class="register-wrapper">

    <!-- LADO IZQUIERDO -->
    <div class="register-left">
        <div class="overlay">
            <h1>Únete a Nuestra Comunidad</h1>
            <p>
                Crea tu cuenta y disfruta de acceso exclusivo a nuestros 
                servicios de turismo ecológico y reservas.
            </p>
        </div>
    </div>

    <!-- LADO DERECHO -->
    <div class="register-right">
        <div class="register-card">
            <h2>👤 Crear Cuenta</h2>
            <p class="subtitle">Completa el formulario para registrarte</p>

            <form id="register-form">
                <label>Nombre Completo</label>
                <input type="text" id="first_name" class="form-control" placeholder="Tu nombre" required>
                <div id="error-name" class="error-bubble" style="display:none;"></div>

                <label>Correo Electrónico</label>
                <input type="email" id="email" class="form-control" placeholder="tu@correo.com" required>
                <div id="error-email" class="error-bubble" style="display:none;"></div>

                <label>Contraseña</label>
                <input type="password" id="password1" class="form-control" required minlength="8">
                <div id="error-password1" class="error-bubble" style="display:none;"></div>

                <label>Confirmar Contraseña</label>
                <input type="password" id="password2" class="form-control" required>
                <div id="error-password2" class="error-bubble" style="display:none;"></div>

                <button type="submit" class="btn-register">Registrarse</button>
            </form>

            <div class="divider">o</div>

            <p class="login-link">
                ¿Ya tienes cuenta?
                <a href="/pages/login.html">Iniciar sesión</a>
            </p>
        </div>

        <a href="/" class="back">← Volver al inicio</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/api.js"></script>
<script>
const pass1 = document.getElementById("password1");
const pass2 = document.getElementById("password2");

function validatePasswords() {
    if (pass1.value.length < 8) {
        pass1.setCustomValidity("La contraseña debe tener al menos 8 caracteres");
    } else {
        pass1.setCustomValidity("");
    }
    if (pass1.value !== pass2.value) {
        pass2.setCustomValidity("Las contraseñas no coinciden");
    } else {
        pass2.setCustomValidity("");
    }
}

pass1.addEventListener("input", validatePasswords);
pass2.addEventListener("input", validatePasswords);

document.getElementById('register-form').addEventListener('submit', async (e) => {
    e.preventDefault();

    const firstName = document.getElementById('first_name').value;
    const email = document.getElementById('email').value;
    const password1 = document.getElementById('password1').value;
    const password2 = document.getElementById('password2').value;
    const btn = document.querySelector('.btn-register');

    // Clear errors
    document.querySelectorAll('.error-bubble').forEach(el => el.style.display = 'none');
    
    // Set loading state
    const originalText = btn.textContent;
    btn.textContent = "Procesando... (puede tardar unos segundos)";
    btn.disabled = true;

    const result = await api.register(firstName, email, password1, password2);

    // Reset loading state
    btn.textContent = originalText;
    btn.disabled = false;

    if (result.success) {
        window.location.href = '/';
    } else {
        const errors = result.errors;
        if (errors.email) {
            const el = document.getElementById('error-email');
            el.textContent = errors.email[0] || errors.email;
            el.style.display = 'block';
        }
        if (errors.password2) {
            const el = document.getElementById('error-password2');
            el.textContent = errors.password2[0] || errors.password2;
            el.style.display = 'block';
        }
        if (errors.first_name) {
            const el = document.getElementById('error-name');
            el.textContent = errors.first_name[0] || errors.first_name;
            el.style.display = 'block';
        }
    }
});
</script>
</body>
</html>
