<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Restablecer Contraseña - Laguna de la Bolsa</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h2 class="text-center mb-4">Nueva Contraseña</h2>
            
            <form id="reset-password-form">
                <div class="mb-3">
                    <label for="password" class="form-label">Nueva Contraseña</label>
                    <input type="password" class="form-control" id="password" required minlength="8" placeholder="Mínimo 8 caracteres">
                </div>
                
                <div class="mb-3">
                    <label for="password_confirm" class="form-label">Confirmar Contraseña</label>
                    <input type="password" class="form-control" id="password_confirm" required minlength="8" placeholder="Repite la contraseña">
                </div>
                
                <div id="message" class="mb-3" style="display: none;"></div>
                
                <button type="submit" class="btn btn-primary w-100 py-2" id="submit-btn" style="background-color: #29B6F6; border: none;">
                    Restablecer Contraseña
                </button>
            </form>
            
            <div id="success-link" class="text-center mt-4" style="display: none;">
                <a href="/pages/login.html" class="btn btn-outline-primary">Ir a Iniciar Sesión</a>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const uid = urlParams.get('uid');
        const token = urlParams.get('token');

        if (!uid || !token) {
            document.getElementById('reset-password-form').style.display = 'none';
            const msgDiv = document.getElementById('message');
            msgDiv.style.display = 'block';
            msgDiv.className = 'alert alert-danger';
            msgDiv.innerText = 'Enlace de recuperación inválido o incompleto.';
        }

        document.getElementById('reset-password-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const passwordConfirm = document.getElementById('password_confirm').value;
            const btn = document.getElementById('submit-btn');
            const msgDiv = document.getElementById('message');
            const successLink = document.getElementById('success-link');
            
            if (password !== passwordConfirm) {
                msgDiv.style.display = 'block';
                msgDiv.className = 'alert alert-danger';
                msgDiv.innerText = 'Las contraseñas no coinciden.';
                return;
            }
            
            btn.disabled = true;
            btn.innerText = 'Procesando...';
            
            const result = await api.passwordResetConfirm(uid, token, password);
            
            msgDiv.style.display = 'block';
            if (result.success) {
                msgDiv.className = 'alert alert-success';
                msgDiv.innerText = result.message;
                document.getElementById('reset-password-form').style.display = 'none';
                successLink.style.display = 'block';
            } else {
                msgDiv.className = 'alert alert-danger';
                msgDiv.innerText = result.error;
                btn.disabled = false;
                btn.innerText = 'Restablecer Contraseña';
            }
        });
    </script>
</body>
</html>
