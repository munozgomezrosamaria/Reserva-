<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f4f8; }
        .sidebar {
            width: 260px;
            min-height: 100vh;
            background-color: #1a3a5c;
            padding: 20px;
            position: fixed;
        }
        .sidebar h5 { color: white; }
        .sidebar .nav-link { color: white; border-radius: 8px; padding: 10px; }
        .sidebar .nav-link:hover { background-color: #2e6da4; }
        .sidebar .active { background-color: #2e6da4; }
        .main-content { margin-left: 260px; padding: 30px; }
        .badge-confirmado { background-color: #2e6da4; }
        .badge-pendiente { background-color: #5bc0de; }
        .badge-cancelado { background-color: #6c757d; }
    </style>
</head>
<body>


<div class="d-flex">
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="text-center mb-4">
            <h5 class="fw-bold">Admin Panel</h5>
        </div>
        <ul class="nav flex-column gap-2">
            <li><a href="#" class="nav-link active" id="btn-usuarios" onclick="showSection('usuarios')">👤 Usuarios</a></li>
            <li><a href="#" class="nav-link" id="btn-reservas" onclick="showSection('reservas')">📅 Reservas</a></li>
            <li>
                <form onsubmit="handleLogout(event)">
                    <button type="submit" class="nav-link btn btn-link text-white w-100 text-start" style="text-decoration:none;">
                        🚪 Cerrar Sesión
                    </button>
                </form>
            </li>
        </ul>
    </div>

    <!-- Contenido principal -->
    <div class="main-content w-100">

        <!-- SECCIÓN USUARIOS -->
        <div id="section-usuarios">
            <h4 style="color:#2e6da4;" class="mb-4">Usuarios</h4>
            <div class="row g-3 mb-4">
                <div class="col-md-3">
                    <div class="card text-white" style="background-color:#5bc0de;">
                        <div class="card-body">
                            <h6>Total Usuarios</h6>
                            <h3 id="total-usuarios">...</h3>
                        </div>
                    </div>
                </div>
            </div>
            <div class="card shadow-sm">
                <div class="card-body">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>ID</th>
                                <th>Nombre</th>
                                <th>Email</th>
                                <th>Es Admin</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-usuarios">
                            <tr><td colspan="4" class="text-center text-muted">Cargando...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- SECCIÓN RESERVAS -->
        <div id="section-reservas" style="display:none;">
            <h4 style="color:#2e6da4;" class="mb-4">Gestión de Reservas</h4>
            <div class="card shadow-sm">
                <div class="card-body">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>ID</th>
                                <th>Usuario</th>
                                <th>Actividad</th>
                                <th>Fecha</th>
                                <th>Personas</th>
                                <th>Estado</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-reservas">
                            <tr><td colspan="7" class="text-center text-muted">Cargando...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>
</div>

<!-- Modal Editar Reserva -->
<div class="modal fade" id="modalEditar" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Editando Reserva</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="edit-id">
                <div class="mb-3">
                    <label class="form-label fw-bold">Estado</label>
                    <select id="edit-state" class="form-select">
                        <option value="confirmado">Confirmado</option>
                        <option value="pendiente">Pendiente</option>
                        <option value="cancelado">Cancelado</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn text-white" style="background-color:#2e6da4;" onclick="guardarEdicion()">Guardar</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/api.js"></script>
<script>
    const API_BASE = window.location.hostname === 'localhost'
        ? 'http://localhost:8000/api'
        : 'https://reserva-kuiz.onrender.com/api';

    function getToken() {
        return localStorage.getItem('access_token');
    }

    function showSection(section) {
        document.getElementById('section-usuarios').style.display = section === 'usuarios' ? 'block' : 'none';
        document.getElementById('section-reservas').style.display = section === 'reservas' ? 'block' : 'none';
        document.getElementById('btn-usuarios').classList.toggle('active', section === 'usuarios');
        document.getElementById('btn-reservas').classList.toggle('active', section === 'reservas');
        if (section === 'reservas') cargarReservas();
        if (section === 'usuarios') cargarUsuarios();
    }

    async function cargarUsuarios() {
        const res = await fetch(`${API_BASE}/users/admin/`, {
            headers: { 'Authorization': `Bearer ${getToken()}` }
        });
        if (!res.ok) { window.location.href = '../pages/login.html'; return; }
        const users = await res.json();
        document.getElementById('total-usuarios').textContent = users.length;
        document.getElementById('tabla-usuarios').innerHTML = users.map(u => `
            <tr>
                <td>${u.id}</td>
                <td>${u.first_name}</td>
                <td>${u.email}</td>
                <td>${u.is_staff ? '<span class="badge bg-success">Sí</span>' : '<span class="badge bg-secondary">No</span>'}</td>
            </tr>
        `).join('');
    }

    async function cargarReservas() {
        const res = await fetch(`${API_BASE}/reservations/admin/`, {
            headers: { 'Authorization': `Bearer ${getToken()}` }
        });
        if (!res.ok) return;
        const reservas = await res.json();
        document.getElementById('tabla-reservas').innerHTML = reservas.length === 0
            ? '<tr><td colspan="7" class="text-center text-muted">No hay reservas.</td></tr>'
            : reservas.map(r => `
                <tr>
                    <td>${r.id}</td>
                    <td>${r.user_name || r.user}</td>
                    <td>${r.service_title || r.service}</td>
                    <td>${r.date}</td>
                    <td>${r.number_persons}</td>
                    <td><span class="badge rounded-pill badge-${r.state}">${r.state}</span></td>
                    <td>
                        <button class="btn btn-sm btn-outline-primary" onclick="abrirEditar(${r.id}, '${r.state}')">Editar</button>
                        <button class="btn btn-sm btn-outline-danger" onclick="eliminarReserva(${r.id})">Eliminar</button>
                    </td>
                </tr>
            `).join('');
    }

    function abrirEditar(id, state) {
        document.getElementById('edit-id').value = id;
        document.getElementById('edit-state').value = state;
        new bootstrap.Modal(document.getElementById('modalEditar')).show();
    }

    async function guardarEdicion() {
        const id = document.getElementById('edit-id').value;
        const state = document.getElementById('edit-state').value;
        const res = await fetch(`${API_BASE}/reservations/admin/${id}/`, {
            method: 'PATCH',
            headers: {
                'Authorization': `Bearer ${getToken()}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ state })
        });
        if (res.ok) {
            bootstrap.Modal.getInstance(document.getElementById('modalEditar')).hide();
            cargarReservas();
        }
    }

    async function eliminarReserva(id) {
        if (!confirm('¿Estás segura de eliminar esta reserva?')) return;
        const res = await fetch(`${API_BASE}/reservations/admin/${id}/`, {
            method: 'DELETE',
            headers: { 'Authorization': `Bearer ${getToken()}` }
        });
        if (res.ok) cargarReservas();
    }

    function handleLogout(e) {
        e.preventDefault();
        localStorage.removeItem('access_token');
        localStorage.removeItem('refresh_token');
        localStorage.removeItem('user_data');
        window.location.href = '../pages/login.html';
    }

    // Verificar que sea admin al cargar
    window.onload = function() {
        const user = JSON.parse(localStorage.getItem('user_data') || '{}');
        if (!user.is_staff) {
            window.location.href = '../pages/login.html';
        }
        cargarUsuarios();
    }
</script>
</body>


</html>
