<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Recuperar Contraseña - Laguna de la Bolsa</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h2 class="text-center mb-4">Recuperar Contraseña</h2>
            <p class="text-muted text-center mb-4">
                Ingresa tu correo electrónico y te enviaremos un enlace para restablecer tu contraseña.
            </p>
            
            <form id="forgot-password-form">
                <div class="mb-3">
                    <label for="email" class="form-label">Correo Electrónico</label>
                    <input type="email" class="form-control" id="email" required placeholder="ejemplo@correo.com">
                </div>
                
                <div id="message" class="mb-3" style="display: none;"></div>
                
                <button type="submit" class="btn btn-primary w-100 py-2" id="submit-btn" style="background-color: #29B6F6; border: none;">
                    Enviar enlace de recuperación
                </button>
            </form>
            
            <div class="text-center mt-4">
                <a href="/pages/login.html" class="text-decoration-none" style="color: #29B6F6;">Volver al inicio de sesión</a>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script>
        document.getElementById('forgot-password-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const btn = document.getElementById('submit-btn');
            const msgDiv = document.getElementById('message');
            
            btn.disabled = true;
            btn.innerText = 'Enviando...';
            
            const result = await api.passwordResetRequest(email);
            
            msgDiv.style.display = 'block';
            if (result.success) {
                msgDiv.className = 'alert alert-success';
                msgDiv.innerText = result.message;
                document.getElementById('forgot-password-form').reset();
            } else {
                msgDiv.className = 'alert alert-danger';
                msgDiv.innerText = result.error;
            }
            
            btn.disabled = false;
            btn.innerText = 'Enviar enlace de recuperación';
        });
    </script>
</body>
</html>
