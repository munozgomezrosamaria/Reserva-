{% extends "base_admin.html" %}
{% block title %}Editar Reserva{% endblock %}

{% block content %}
<div class="d-flex" style="min-height: 100vh;">

    <!-- Sidebar -->
    <div style="width:260px; background-color:#1a3a5c; min-height:100vh; padding:20px;" class="text-white">
        <div class="text-center mb-4">
            <h5 class="fw-bold">Admin Panel</h5>
        </div>
        <ul class="nav flex-column gap-2">
            <li><a href="{% url 'reservations:admin_users' %}" class="nav-link text-white">👤 Usuarios</a></li>
            <li><a href="#" class="nav-link text-white">⚙️ Servicios</a></li>
            <li><a href="{% url 'reservations:admin_reservations' %}" class="nav-link text-white fw-bold" style="background:#2e6da4; border-radius:8px;">📅 Reservas</a></li>
            <li><a href="#" class="nav-link text-white">📄 PGIR</a></li>
            <li><a href="#" class="nav-link text-white">💬 Mensajes</a></li>
            <li>
                <form method="POST" action="{% url 'users:logout' %}">
                    {% csrf_token %}
                    <button type="submit" class="nav-link text-white btn btn-link" style="text-decoration:none;">🚪 Cerrar Sesión</button>
                </form>
            </li>
        </ul>
    </div>

    <!-- Contenido -->
    <div class="flex-grow-1 p-4">
        <h4 class="mb-4" style="color:#2e6da4;">Editando Reserva #{{ reservation.id }}</h4>

        <div class="card shadow-sm" style="max-width:500px;">
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-bold">Usuario</label>
                        <input type="text" class="form-control" value="{{ reservation.user.first_name }}" disabled>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Actividad</label>
                        <input type="text" class="form-control" value="{{ reservation.service.title }}" disabled>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Fecha</label>
                        <input type="text" class="form-control" value="{{ reservation.date }}" disabled>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Personas</label>
                        <input type="text" class="form-control" value="{{ reservation.number_persons }}" disabled>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Estado</label>
                        <select name="state" class="form-select">
                            <option value="confirmado" {% if reservation.state == 'confirmado' %}selected{% endif %}>Confirmado</option>
                            <option value="pendiente" {% if reservation.state == 'pendiente' %}selected{% endif %}>Pendiente</option>
                            <option value="cancelado" {% if reservation.state == 'cancelado' %}selected{% endif %}>Cancelado</option>
                        </select>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn text-white" style="background-color:#2e6da4;">Guardar cambios</button>
                        <a href="{% url 'reservations:admin_reservations' %}" class="btn btn-outline-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
